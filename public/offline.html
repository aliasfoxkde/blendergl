<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlenderGL - Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0f;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
      }
      .container { max-width: 480px; }
      .icon {
        width: 64px; height: 64px; border-radius: 16px;
        background: linear-gradient(135deg, #f97316, #3b82f6);
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 1.5rem; font-size: 24px; font-weight: bold;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
      p { color: #9ca3af; line-height: 1.6; margin-bottom: 1.5rem; }
      button {
        padding: 0.75rem 1.5rem;
        background: linear-gradient(to right, #f97316, #3b82f6);
        color: #fff; border: none; border-radius: 0.75rem;
        font-size: 1rem; font-weight: 600; cursor: pointer;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">GL</div>
      <h1>You're Offline</h1>
      <p>
        BlenderGL requires an internet connection to load the editor.
        Please check your connection and try again.
      </p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
